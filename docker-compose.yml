services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-bot-postgres
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot_events
    ports:
      - "5432:5432"
    volumes:
      - bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d bot_events"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bot_pgdata:
