# clients/cesi/ui.yaml — fallback, nudge, antispam (free_consultation: false in features.yaml)
fallback_menu:
  low_score:
    answer: >-
      Не нашла точного ответа. Запишитесь на консультацию — администратор свяжется с вами.
    cta_action: lead
  no_candidates:
    answer: >-
      Не нашла ответа на этот вопрос. Попробуйте спросить иначе — или запишитесь на консультацию, там разберём.

consult_nudge:
  exhausted_prompt: |
    Задача на этот ответ:
    После ответа по вопросу пациенту по этой теме в базе больше нечего добавить — тема для справочного ответа исчерпана.
    Заверши ответ естественно: мягко предложи консультацию в клинике как следующий шаг (своими словами, в том же тоне, без давления).
    Не называй консультацию бесплатной, если это не указано в источнике. Не предлагай текстом «могу ещё рассказать».
  streak_prompt: |
    Задача на этот ответ:
    Пациент уже несколько раз уточнял по теме клиники.
    Сначала ответь по существу на вопрос, затем в конце того же ответа мягко предложи консультацию, чтобы разобрать детали лично (без слова «бесплатная», если это не в источнике).

messaging:
  anti_spam_soft_redirect: >-
    Я рассказала уже довольно много о разных темах. Возможно, удобнее обсудить вашу ситуацию напрямую —
    можно записаться на консультацию, врач ответит на всё сразу.
