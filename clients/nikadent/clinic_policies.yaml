# Explicit clinic business constraints (not retrieved from md).
contact:
  phone_display: "+7 (900) 444-69-97"

policies:
  no_pediatric_dentistry:
    triggers:
      - "детск"
      - "ребен"
      - "ребён"
      - "детей"
      - "детям"
      - "малыш"
      - "несовершеннолет"
    answer: >-
      Мы работаем только со взрослыми пациентами — детскую стоматологию в клинике не ведём.
      Если нужна консультация для взрослого — с радостью подскажу по нашим услугам и записи.

  no_oms:
    triggers:
      - "омс"
      - "полис омс"
      - "по омс"
    answer: >-
      По полису ОМС мы не работаем — лечение идёт на платной основе.
      Могу рассказать о стоимости, рассрочке и записи на консультацию.

  no_dms:
    triggers:
      - "дмс"
      - "полис дмс"
      - "по дмс"
    answer: >-
      По ДМС напрямую не работаем — оплата по договору с клиникой (наличные, карта, рассрочка).
      Подробности по оплате могу подсказать отдельно.

service_alternatives:
  - match_keywords:
      - "брекет"
    mention: "элайнеры"
    suggest_ref: "orthodontics__service__aligners.md#korotko"
    note: >-
      Брекеты мы не устанавливаем; для выравнивания зубов у нас есть элайнеры — прозрачные капы.
      Могу кратко рассказать про элайнеры или записать на консультацию.

service_not_offered_template: >-
  К сожалению, услугу «{requested_service}» в нашей клинике не оказываем.
  Могу подсказать по направлениям, которые у нас есть, или записать на консультацию.

hard_stop_template: >-
  Я помогаю по вопросам клиники: услуги, цены, запись и контакты.
  Если у вас есть вопрос по стоматологии в рамках нашей клиники — напишите, пожалуйста.

manual_contact_template: >-
  Такой вопрос лучше решить напрямую с клиникой — так будет быстрее и корректнее.
  Пожалуйста, позвоните нам{phone_suffix}.{urgent_suffix}

manual_contact_urgent_suffix: >-
   Если ситуация срочная, не ждите ответа в чате — лучше позвонить сразу.
