# clients/demo/ui.yaml — меню и fallback-ответы (виджет: widget_config.json)
guided_menu:
  answer: "Могу коротко подсказать и помочь выбрать направление — что для вас важнее?"
  quick_replies:
    - label: "Стоимость имплантации"
      ref: "implantation__pricing__implants.md#korotko"
    - label: "Больно ли ставить имплант?"
      ref: "implantation__faq__pain.md#korotko"
    - label: "Что будет на консультации?"
      ref: "clinic__info__consultation.md#korotko"
    - label: "Хочу записаться"
      ref: "lead:booking"

continuation_clarify:
  answer: "Могу подсказать по услугам, ценам, врачам или записи. Что вас интересует?"

fallback_menu:
  low_score:
    answer: >-
      Не нашла точного ответа. Запишитесь на консультацию, она у нас бесплатная,
      цена фиксируется в договоре без скрытых доплат, возможен налоговый вычет 13%.
    cta_action: lead
  no_candidates:
    answer: >-
      Не нашла ответа на этот вопрос. Попробуйте спросить иначе — или запишитесь на консультацию,
      там разберём.
  offtopic:
    answer: >-
      Я помогаю по вопросам клиники: услуги, цены, подготовка, сроки, запись и контакты.
      Если хотите, подскажу по вашему вопросу в этом контексте.
  empty_question:
    answer: "Уточните вопрос."
  bare_affirmative:
    answer: "Напишите, пожалуйста, ваш вопрос — так будет проще подсказать."

consult_nudge:
  exhausted_prompt: |
    Задача на этот ответ:
    После ответа по вопросу пациенту по этой теме в базе больше нечего добавить — тема для справочного ответа исчерпана.
    Заверши ответ естественно: мягко предложи бесплатную консультацию в клинике как следующий шаг (своими словами, в том же тоне, без давления).
    Не предлагай текстом «могу ещё рассказать» — только консультацию, если уместно завершить диалог.
  streak_prompt: |
    Задача на этот ответ:
    Пациент уже несколько раз уточнял по теме клиники.
    Сначала ответь по существу на вопрос, затем в конце того же ответа мягко предложи бесплатную консультацию, чтобы разобрать детали лично (своими словами, без шаблонных фраз и без давления).

messaging:
  anti_spam_soft_redirect: >-
    Я рассказал уже довольно много о разных темах. Возможно, удобнее обсудить вашу ситуацию напрямую —
    консультация бесплатна, врач ответит на всё сразу.
