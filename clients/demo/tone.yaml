# clients/demo/tone.yaml — тексты диалога (сейчас дублируют app.py TXT; Phase M3 вынесет в runtime)
# Ключи совпадают с app.py TXT для будущей загрузки.

bot_name: "Надежда"
online_label: "ИИ-консультант клиники. Онлайн 24/7"

lead:
  name_prompt: "Хорошо, помогу с записью. Как к вам можно обращаться?"
  name_retry: "Как к вам можно обращаться? Напишите, пожалуйста, имя."
  name_hard: "Напишите просто имя — например, Мария или Андрей."
  name_invalid: "Не совсем поняла — напишите просто имя, например Мария."
  name_confirm_tpl: "Вас зовут {name}, правильно?"
  name_reenter: "Хорошо. Как к вам можно обращаться?"
  phone_prompt_tpl: "{name}, оставьте, пожалуйста, номер телефона — администратор свяжется с вами, чтобы подтвердить запись."
  phone_retry: "Не получилось распознать номер. Напишите в формате +7XXXXXXXXXX."
  submit_ok: >-
    Спасибо! Это демо-бот: заявка никуда не ушла, звонка не будет.
    В рабочем боте для клиники после телефона заявка автоматически придёт вам на почту и в CRM.
  submit_error: "Что-то пошло не так. Проверьте номер и попробуйте ещё раз."
  offer_declined: "Хорошо. Если появятся вопросы — спрашивайте."

situation:
  prompt: >-
    Опишите коротко ситуацию — что болит, что беспокоит, или просто какой вопрос.
    Врач заранее будет в курсе и это поможет при консультации
  retry_short: "Напишите чуть подробнее — буквально 1–2 фразы. Чем точнее, тем лучше врач подготовится."
  to_lead_name: >-
    Спасибо, записала. Эту информацию передадим в клинику,
    чтобы врач заранее понимал вашу ситуацию. Как к вам можно обращаться?
  back_fallback: "Хорошо, продолжим. Задайте вопрос или выберите тему."

guided_menu:
  answer: "Могу коротко подсказать и помочь выбрать направление — что для вас важнее?"

continuation:
  clarify_answer: "Могу подсказать по услугам, ценам, врачам или записи. Что вас интересует?"

fallback:
  bare_affirmative: "Напишите, пожалуйста, ваш вопрос — так будет проще подсказать."
